<!DOCTYPE html>
<html>
<head>
    <title>SimEra IPTV Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <meta charset="UTF-8">
</head>
<body>
<div id="startupLoader">
<div class="startup-box">
<div class="startup-logo">
📺
</div>
<div class="startup-title">
INTERNET TV
</div>
<div class="startup-sub">
Developed by KAMOL
</div>
<div class="startup-ring"></div>
</div>
</div>
<div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="logo">INTERNET TV DEVELOPED by KAMOL</div>
    </div>
     <!-- SEARCH BOX  <iframe src="http://172.16.13.2/" width="800" height="600"></iframe> -->



    <!-- MAIN AREA -->
    <div class="main">

        <!-- VIDEO PLAYER -->
<div class="player-frame">
    <div class="player" style="position:relative;">
    <video id="videoPlayer"
       playsinline
       webkit-playsinline
       controls
       poster="assets/default-channel.png">

    </video>
    <div id="loader" class="loader"></div>
    <div id="overlay" class="overlay"></div>
</div>
<!-- Buttons -->
<div class="playlist-container">
 <button id="prevChannelBtn" class="playlist-btn">⏮ Previous</button>

  <button class="playlist-btn" onclick="setActivePlaylist(this,'Bangla')">Channel List 1</button>
  <button class="playlist-btn" onclick="setActivePlaylist(this,'Hindi')">Channel List 2</button>
  <button class="playlist-btn" onclick="setActivePlaylist(this,'Sports')">Channel List 3</button>
  <a href="http://172.16.13.2/" class="btn">MORE</a>
  <a href="http://moviemazic.xyz/live-tv.html" class="btn">MORE</a>

 <button id="nextChannelBtn" class="playlist-btn">Next ⏭</button>
</div>


        <!-- SEARCH BOX -->
        <div class="search-box">
            <input id="searchInput" placeholder="Search channels...">
        </div>
    <div id="defaultPlaylists">

        <!-- CATEGORY BAR -->
        <div id="categoryBar" class="category-bar"></div>

        <!-- CHANNEL GRID -->
        <div id="channelCount"></div>
        <div id="channelGrid" class="channel-grid"></div>

    </div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
    <h2>Playlist Settings</h2>

    <div class="drawer-section">
        <label>Upload Playlist</label>
        <input type="file" id="playlistFile" accept=".m3u,.m3u8">
    </div>

    <div class="drawer-section">
        <label>Playlist URL</label>
        <input type="text" id="playlistUrl" placeholder="https://example.com/list">
        <button id="loadUrlBtn">Load URL</button>
    </div>

    <div class="drawer-section">
        <button id="resetBtn">Reset Playlist</button>
    </div>
</div>



<button id="menuBtn" class="menu-btn">☰</button>



<script>
  const video = document.getElementById("videoPlayer");
  const loader = document.getElementById("loader");
  const overlay = document.getElementById("overlay");

  video.addEventListener("waiting", () => {
    loader.style.display = "block";
    overlay.style.display = "block";
  });

  video.addEventListener("playing", () => {
    loader.style.display = "none";
    overlay.style.display = "none";
  });

  video.addEventListener("ended", () => {
    loader.style.display = "none";
    overlay.style.display = "none";
  });
</script>

<script src="js/parser.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</body>
</html>
